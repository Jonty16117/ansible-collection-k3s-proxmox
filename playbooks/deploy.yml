---
# deploy.yml
# Main deployment playbook for k3s cluster on Proxmox
# Usage: ansible-playbook -i inventory/dev/ deploy.yml
#
# This playbook orchestrates the full cluster deployment:
# 1. Calculates cluster topology dynamically
# 2. Creates VMs in Proxmox
# 3. Prepares nodes for k3s
# 4. Installs k3s control plane
# 5. Joins worker nodes

# =============================================================================
# PHASE 0: Bootstrap Inventory
# =============================================================================
# The cluster_config role calculates node lists from topology configuration
# and dynamically adds them to the inventory using add_host
- name: Configure cluster inventory dynamically
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - always
    - config
    - bootstrap

  roles:
    - role: community.k3s_proxmox.cluster_config

# =============================================================================
# PHASE 1: Infrastructure (Proxmox VMs)
# =============================================================================
# VMs are skipped if already running. Use --tags force to force reprovision.
- name: Create VMs in Proxmox
  hosts: proxmox_nodes
  gather_facts: false
  tags:
    - proxmox
    - infrastructure
    - vms
    - force

  roles:
    - role: community.k3s_proxmox.proxmox_vm
      when: proxmox_vm_state | default('present') == 'present'

# =============================================================================
# PHASE 2: Node Preparation
# =============================================================================
# Prepare all k3s nodes (control plane and workers)
- name: Prepare nodes for k3s
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tags:
    - prepare
    - prerequisites
    - k3s

  roles:
    - role: community.k3s_proxmox.k3s_prerequisites

# =============================================================================
# PHASE 3: Control Plane Installation
# =============================================================================
- name: Install k3s control plane
  hosts: control_plane
  become: true
  tags:
    - k3s
    - control-plane
    - server

  roles:
    - role: community.k3s_proxmox.k3s_control_plane

# =============================================================================
# PHASE 4: Worker Nodes
# =============================================================================
- name: Join worker nodes
  hosts: workers
  become: true
  tags:
    - k3s
    - workers
    - agents

  roles:
    - role: community.k3s_proxmox.k3s_workers

# =============================================================================
# KUBECONFIGURATION
# =============================================================================
- name: Fetch and configure kubeconfig
  hosts: control_plane
  gather_facts: false
  tags:
    - always
    - kubeconfig

  tasks:
    - name: Fetch kubeconfig from first control plane
      when: k3s_is_first_node | default(false)
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ k3s_cluster_kubeconfig_save_path }}"
        flat: true
        validate_checksum: true

    - name: Set cluster name in kubeconfig
      when:
        - k3s_cluster_name is defined
        - k3s_cluster_name | length > 0
        - k3s_is_first_node | default(false)
      ansible.builtin.shell:
        cmd: |
          if kubectl config get-contexts default | grep -q "default"; then
            kubectl config rename-context default {{ k3s_cluster_name }}
          else
            echo "Context 'default' not found, skipping rename"
          fi
        executable: /bin/sh
      changed_when: false

# =============================================================================
# COMPLETION
# =============================================================================
- name: Display deployment summary
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - always

  tasks:
    - name: Show success message
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "K3S CLUSTER DEPLOYED SUCCESSFULLY"
          - "=============================================="
          - ""
          - "Next steps:"
          - "  1. Configure kubectl:"
          - "     export KUBECONFIG={{ k3s_cluster_kubeconfig_save_path }}"
          - "  2. Verify nodes: kubectl get nodes"
          - "  3. Check Cilium: kubectl -n kube-system get pods"
          - ""
          - "Run health checks:"
          - "  ansible-playbook -i inventory.yml health-check.yml"
          - "=============================================="