---
# health-check.yml
# Run health checks on deployed cluster
# Usage: ansible-playbook -i inventory/dev/ health-check.yml
#
# This playbook verifies:
# - All nodes are Ready
# - CoreDNS is running
# - Cilium is healthy
# - Basic pod networking works

# =============================================================================
# PHASE 0: Bootstrap Inventory
# =============================================================================
- name: Configure cluster inventory
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - always
    - config

  roles:
    - role: community.k3s_proxmox.cluster_config

# =============================================================================
# HEALTH CHECKS
# =============================================================================
- name: Verify cluster health
  hosts: control_plane[0]          # Run checks from first CP node
  become: true
  gather_facts: false
  tags:
    - health
    - check
    - verify

  tasks:
    # -------------------------------------------------------------------------
    # Node Status
    # -------------------------------------------------------------------------
    - name: Get node status
      ansible.builtin.command: kubectl get nodes -o wide
      register: node_status
      changed_when: false

    - name: Display node status
      ansible.builtin.debug:
        msg: "{{ node_status.stdout_lines }}"

    - name: Check all nodes are Ready
      ansible.builtin.shell: |
        kubectl get nodes -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}'
      register: node_ready_status
      changed_when: false

    - name: Assert all nodes are Ready
      ansible.builtin.assert:
        that:
          - "'False' not in node_ready_status.stdout"
        fail_msg: "Some nodes are not Ready"
        success_msg: "All nodes are Ready"

    # -------------------------------------------------------------------------
    # Cilium Status
    # -------------------------------------------------------------------------
    - name: Check Cilium status
      ansible.builtin.command: cilium status --brief
      register: cilium_status
      changed_when: false
      ignore_errors: true

    - name: Display Cilium status
      ansible.builtin.debug:
        msg: "{{ cilium_status.stdout_lines | default(['Cilium CLI not available']) }}"

    # -------------------------------------------------------------------------
    # CoreDNS
    # -------------------------------------------------------------------------
    - name: Check CoreDNS pods
      ansible.builtin.command: |
        kubectl -n kube-system get pods -l k8s-app=kube-dns -o wide
      register: coredns_pods
      changed_when: false

    - name: Display CoreDNS status
      ansible.builtin.debug:
        msg: "{{ coredns_pods.stdout_lines }}"

    # -------------------------------------------------------------------------
    # Test Pod
    # -------------------------------------------------------------------------
    - name: Create test namespace
      ansible.builtin.command: kubectl create namespace health-check
      register: ns_create
      changed_when: "'created' in ns_create.stdout"
      ignore_errors: true

    - name: Deploy test pod
      ansible.builtin.command: |
        kubectl run test-dns --image=busybox:1.36 --restart=Never \
          --namespace=health-check -- sleep 3600
      register: test_pod
      changed_when: "'Created' in test_pod.stdout"
      ignore_errors: true

    - name: Wait for test pod
      ansible.builtin.command: |
        kubectl wait --for=condition=Ready pod/test-dns \
          --namespace=health-check --timeout=60s
      register: pod_ready
      changed_when: false
      ignore_errors: true

    - name: Test DNS resolution
      ansible.builtin.command: |
        kubectl exec test-dns --namespace=health-check -- nslookup kubernetes.default
      register: dns_test
      changed_when: false
      ignore_errors: true

    - name: Assert DNS works
      ansible.builtin.assert:
        that:
          - dns_test.rc == 0
        fail_msg: "DNS resolution test failed"
        success_msg: "DNS resolution working"
      ignore_errors: true

    # -------------------------------------------------------------------------
    # Cleanup
    # -------------------------------------------------------------------------
    - name: Delete test resources
      ansible.builtin.command: kubectl delete namespace health-check --ignore-not-found=true
      changed_when: false

# =============================================================================
# SUMMARY
# =============================================================================
- name: Display health check summary
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - always

  tasks:
    - name: Show summary
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "HEALTH CHECK COMPLETE"
          - "=============================================="