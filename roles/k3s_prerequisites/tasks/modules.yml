---
# tasks file for k3s_prerequisites - modules
# Configures kernel modules

- name: Load kernel modules immediately
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ k3s_prereq_modules }}"

- name: Ensure modules load on boot
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/k8s.conf
    line: "{{ item }}"
    create: true
    mode: '0644'
  loop: "{{ k3s_prereq_modules }}"

- name: Verify modules are loaded
  ansible.builtin.command: "lsmod | grep {{ item }}"
  register: _module_check
  changed_when: false
  loop: "{{ k3s_prereq_modules }}"
  ignore_errors: true

- name: Display module status
  ansible.builtin.debug:
    msg: "Module {{ item.item }}: {{ 'loaded' if item.rc == 0 else 'not loaded' }}"
  loop: "{{ _module_check.results }}"
  loop_control:
    label: "{{ item.item }}"