---
# tasks file for k3s_prerequisites - bpf-mounts
# Configures BPF filesystem mounts for Cilium

- name: Check if BPF filesystem is mounted
  ansible.builtin.shell: mount | grep bpf
  register: _bpf_mounted
  changed_when: false
  ignore_errors: true

- name: Mount BPF filesystem
  ansible.posix.mount:
    path: "{{ k3s_prereq_bpf_mount }}"
    src: bpf
    fstype: bpf
    opts: defaults
    state: mounted
  when: _bpf_mounted.rc != 0

- name: Ensure BPF mount persists
  ansible.posix.mount:
    path: "{{ k3s_prereq_bpf_mount }}"
    src: bpf
    fstype: bpf
    opts: defaults
    state: present

- name: Create cgroup2 mount point
  ansible.builtin.file:
    path: /run/cilium/cgroupv2
    state: directory
    mode: '0755'

- name: Mount cgroup2 for Cilium
  ansible.posix.mount:
    path: /run/cilium/cgroupv2
    src: cgroup2
    fstype: cgroup2
    opts: defaults
    state: mounted
  ignore_errors: true

- name: Verify BPF mount
  ansible.builtin.command: mount | grep bpf
  register: _bpf_verify
  changed_when: false

- name: Display BPF mount status
  ansible.builtin.debug:
    msg: "BPF filesystem mounted at {{ k3s_prereq_bpf_mount }}: {{ 'yes' if _bpf_verify.rc == 0 else 'no' }}"