---
# tasks file for k3s_prerequisites - services
# Configures system services

- name: Enable required services
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ k3s_prereq_services_enable }}"

- name: Disable unnecessary services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: false
  loop: "{{ k3s_prereq_services_disable }}"
  ignore_errors: true

- name: Stop unnecessary services
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
  loop: "{{ k3s_prereq_services_disable }}"
  ignore_errors: true