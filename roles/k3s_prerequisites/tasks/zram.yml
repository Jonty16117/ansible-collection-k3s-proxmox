---
# tasks file for k3s_prerequisites - zram
# Configures zRAM for compressed swap

- name: Configure zRAM
  ansible.builtin.template:
    src: zram-init.conf.j2
    dest: /etc/conf.d/zram-init
    mode: '0644'
  vars:
    zram_size: "{{ k3s_prereq_zram_size }}"

- name: Enable zRAM service
  ansible.builtin.service:
    name: zram-init
    state: started
    enabled: true

- name: Verify zRAM is active
  ansible.builtin.command: cat /proc/swaps
  register: _swaps
  changed_when: false

- name: Display zRAM status
  ansible.builtin.debug:
    msg: "zRAM swap configured: {{ 'yes' if '/dev/zram' in _swaps.stdout else 'no' }}"