---
# tasks file for cluster_config - control plane calculation
# Calculates control plane node properties with override support

- name: Initialize control plane node list
  ansible.builtin.set_fact:
    _k3s_cp_nodes: []

- name: Calculate control plane node properties
  ansible.builtin.set_fact:
    _k3s_cp_nodes: "{{ _k3s_cp_nodes + [_node_data] }}"
  vars:
    _node_id: "{{ item }}"
    _node_name: "{{ k3s_cluster_topology.control_plane.naming | replace('{id}', item | string) }}"
    _node_vmid: "{{ k3s_cluster_topology.control_plane.vmid_start + (item | int - 1) }}"
    _node_ip: "{{ _k3s_network_prefix }}{{ _k3s_network_third_octet }}.{{ k3s_cluster_topology.control_plane.ip_start + item | int - 1 }}"
    
    # Check for per-node override in k3s_node_overrides
    _override: "{{ k3s_node_overrides[_node_name] | default({}) }}"
    
    # Apply overrides or use topology defaults
    _node_memory: "{{ _override.memory | default(k3s_cluster_topology.control_plane.memory) }}"
    _node_disk: "{{ _override.disk | default(k3s_cluster_topology.control_plane.disk) }}"
    _node_cpu: "{{ _override.cpu_cores | default(k3s_cluster_topology.control_plane.cpu_cores) }}"
    
    _node_data:
      id: "{{ _node_id }}"
      name: "{{ _node_name }}"
      vmid: "{{ _node_vmid }}"
      ip: "{{ _node_ip }}"
      memory: "{{ _node_memory }}"
      disk: "{{ _node_disk }}"
      cpu_cores: "{{ _node_cpu }}"
      role: "control-plane"
  loop: "{{ range(1, k3s_cluster_topology.control_plane.count | int + 1) | list }}"

- name: Display calculated control plane nodes
  ansible.builtin.debug:
    var: _k3s_cp_nodes
    verbosity: 1

- name: Verify control plane node count
  ansible.builtin.assert:
    that:
      - _k3s_cp_nodes | length == k3s_cluster_topology.control_plane.count | int
    fail_msg: "Control plane node calculation failed - count mismatch"
    success_msg: "Control plane nodes calculated successfully: {{ _k3s_cp_nodes | length }} nodes"