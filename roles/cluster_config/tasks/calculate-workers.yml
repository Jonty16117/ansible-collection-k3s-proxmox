---
# tasks file for cluster_config - worker calculation
# Calculates worker node properties with override support

- name: Initialize worker node list
  ansible.builtin.set_fact:
    _k3s_worker_nodes: []
  when: k3s_cluster_topology.workers.count | int > 0

- name: Calculate worker node properties
  ansible.builtin.set_fact:
    _k3s_worker_nodes: "{{ _k3s_worker_nodes + [_node_data] }}"
  vars:
    _node_id: "{{ item }}"
    _node_name: "{{ k3s_cluster_topology.workers.naming | replace('{id}', item | string) }}"
    _node_vmid: "{{ k3s_cluster_topology.workers.vmid_start + (item | int - 1) }}"
    _node_ip: "{{ _k3s_network_prefix }}{{ _k3s_network_third_octet }}.{{ k3s_cluster_topology.workers.ip_start + item | int - 1 }}"
    
    # Check for per-node override in k3s_node_overrides
    _override: "{{ k3s_node_overrides[_node_name] | default({}) }}"
    
    # Apply overrides or use topology defaults
    _node_memory: "{{ _override.memory | default(k3s_cluster_topology.workers.memory) }}"
    _node_disk: "{{ _override.disk | default(k3s_cluster_topology.workers.disk) }}"
    _node_cpu: "{{ _override.cpu_cores | default(k3s_cluster_topology.workers.cpu_cores) }}"
    
    _node_data:
      id: "{{ _node_id }}"
      name: "{{ _node_name }}"
      vmid: "{{ _node_vmid }}"
      ip: "{{ _node_ip }}"
      memory: "{{ _node_memory }}"
      disk: "{{ _node_disk }}"
      cpu_cores: "{{ _node_cpu }}"
      role: "worker"
  loop: "{{ range(1, k3s_cluster_topology.workers.count | int + 1) | list }}"
  when: k3s_cluster_topology.workers.count | int > 0

- name: Display calculated worker nodes
  ansible.builtin.debug:
    var: _k3s_worker_nodes
    verbosity: 1
  when: _k3s_worker_nodes | default([]) | length > 0

- name: Verify worker node count
  ansible.builtin.assert:
    that:
      - _k3s_worker_nodes | default([]) | length == k3s_cluster_topology.workers.count | int
    fail_msg: "Worker node calculation failed - count mismatch"
    success_msg: "Worker nodes calculated successfully: {{ _k3s_worker_nodes | length }} nodes"
  when: k3s_cluster_topology.workers.count | int > 0

- name: Set empty worker list if no workers
  ansible.builtin.set_fact:
    _k3s_worker_nodes: []
  when: k3s_cluster_topology.workers.count | int == 0