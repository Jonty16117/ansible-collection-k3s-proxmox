---
# tasks file for cluster_config - warnings
# Generates warnings for unconventional cluster topologies

- name: Initialize warnings list
  ansible.builtin.set_fact:
    _k3s_warnings: []

- name: Warning - Single control plane with many workers
  ansible.builtin.set_fact:
    _k3s_warnings: "{{ _k3s_warnings + [_warning_msg] }}"
  vars:
    _warning_msg: "Single control plane ({{ k3s_cluster_topology.control_plane.count }} node) with {{ k3s_cluster_topology.workers.count }} workers. Consider 3 CP for HA."
  when:
    - k3s_cluster_topology.control_plane.count | int == 1
    - k3s_cluster_topology.workers.count | int >= 5
    - not k3s_cluster_topology.skip_warnings | bool

- name: Warning - HA control plane with no workers
  ansible.builtin.set_fact:
    _k3s_warnings: "{{ _k3s_warnings + [_warning_msg] }}"
  vars:
    _warning_msg: "HA control plane ({{ k3s_cluster_topology.control_plane.count }} nodes) with 0 workers. CP nodes will run workloads."
  when:
    - k3s_cluster_topology.control_plane.count | int >= 3
    - k3s_cluster_topology.workers.count | int == 0
    - not k3s_cluster_topology.skip_warnings | bool

- name: Warning - Over-provisioned control plane
  ansible.builtin.set_fact:
    _k3s_warnings: "{{ _k3s_warnings + [_warning_msg] }}"
  vars:
    _warning_msg: "Over-provisioned control plane: {{ k3s_cluster_topology.control_plane.count }} CP with only {{ k3s_cluster_topology.workers.count }} workers. Consider reducing to 3 CP."
  when:
    - k3s_cluster_topology.control_plane.count | int >= 5
    - k3s_cluster_topology.workers.count | int <= 2
    - not k3s_cluster_topology.skip_warnings | bool

- name: Warning - HA with single worker
  ansible.builtin.set_fact:
    _k3s_warnings: "{{ _k3s_warnings + [_warning_msg] }}"
  vars:
    _warning_msg: "HA control plane ({{ k3s_cluster_topology.control_plane.count }} nodes) with only 1 worker. Add more workers for redundancy."
  when:
    - k3s_cluster_topology.control_plane.count | int >= 3
    - k3s_cluster_topology.workers.count | int == 1
    - not k3s_cluster_topology.skip_warnings | bool

- name: Warning - Unusual control plane count
  ansible.builtin.set_fact:
    _k3s_warnings: "{{ _k3s_warnings + [_warning_msg] }}"
  vars:
    _warning_msg: "Unusual control plane count: {{ k3s_cluster_topology.control_plane.count }} nodes. Most clusters use 1, 3, or 5."
  when:
    - k3s_cluster_topology.control_plane.count | int >= 7
    - not k3s_cluster_topology.skip_warnings | bool

- name: Display warnings header
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - "CLUSTER CONFIGURATION WARNINGS"
      - "=============================================="
  when: _k3s_warnings | length > 0

- name: Display each warning
  ansible.builtin.debug:
    msg: "⚠️  {{ item }}"
  loop: "{{ _k3s_warnings }}"
  when: _k3s_warnings | length > 0

- name: Display warnings footer
  ansible.builtin.debug:
    msg:
      - ""
      - "To disable warnings, set k3s_cluster_topology.skip_warnings: true"
      - "=============================================="
  when: _k3s_warnings | length > 0