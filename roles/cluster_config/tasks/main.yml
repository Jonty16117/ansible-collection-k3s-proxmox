---
# tasks file for cluster_config
# Calculates cluster topology and dynamically adds hosts to inventory

- name: Log cluster configuration
  ansible.builtin.debug:
    msg: "Cluster: {{ k3s_cluster_topology.control_plane.count }} CP, {{ k3s_cluster_topology.workers.count }} workers, {{ k3s_network.base_cidr }}"

- name: Parse network
  ansible.builtin.set_fact:
    network_prefix: "{{ k3s_network.base_cidr.split('/')[0].rsplit('.', 1)[0] }}."

- name: Include validation
  ansible.builtin.include_tasks: validate.yml
  when: k3s_validate_topology | bool

- name: Calculate control plane nodes
  ansible.builtin.include_tasks: calculate-nodes.yml
  vars:
    _node_type: control_plane

- name: Calculate worker nodes
  ansible.builtin.include_tasks: calculate-nodes.yml
  vars:
    _node_type: workers

- name: Generate warnings
  ansible.builtin.include_tasks: warnings.yml

- name: Add hosts to inventory
  ansible.builtin.include_tasks: add-hosts.yml

- name: Build summary
  ansible.builtin.set_fact:
    cp_node_summary: "{{ _k3s_cp_nodes | map(attribute='name') | list }}"
    worker_node_summary: "{{ _k3s_worker_nodes | default([]) | map(attribute='name') | list }}"

- name: Display inventory summary
  ansible.builtin.debug:
    msg: "Inventory ready: CP={{ cp_node_summary }}, Workers={{ worker_node_summary }}"