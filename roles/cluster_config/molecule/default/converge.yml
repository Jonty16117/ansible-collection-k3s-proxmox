---
# converge.yml for cluster_config role
# Applies the role to test the configuration

- name: Converge - Test cluster_config role
  hosts: localhost
  connection: local
  gather_facts: false
  
  tasks:
    - name: Include cluster_config role
      ansible.builtin.include_role:
        name: cluster_config
      
    - name: Display calculated nodes (for debugging)
      ansible.builtin.debug:
        var: _k3s_cp_nodes
        
    - name: Display worker nodes (for debugging)
      ansible.builtin.debug:
        var: _k3s_worker_nodes