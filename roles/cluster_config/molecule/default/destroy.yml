---
# destroy.yml for cluster_config role
# Cleans up the test environment

- name: Destroy - Cleanup test environment
  hosts: localhost
  connection: local
  gather_facts: false
  
  tasks:
    - name: Remove test SSH key
      ansible.builtin.file:
        path: "/tmp/test_ssh_key"
        state: absent
      
    - name: Display cleanup complete
      ansible.builtin.debug:
        msg: "Test environment cleaned up successfully"