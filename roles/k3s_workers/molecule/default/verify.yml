---
# verify.yml for k3s_workers role
# Verifies the role logic works correctly

- name: Verify - Test k3s_workers
  hosts: workers
  gather_facts: false
  become: true
  
  tasks:
    # -------------------------------------------------------------------------
    # Test 1: Verify k3s config directory was created
    # -------------------------------------------------------------------------
    - name: Check k3s config directory
      ansible.builtin.stat:
        path: /tmp/mock-k3s-config
      register: _config_dir
    
    - name: Assert config directory exists
      ansible.builtin.assert:
        that:
          - _config_dir.stat.exists
          - _config_dir.stat.isdir
        fail_msg: "K3s config directory not created"
        success_msg: "K3s config directory exists"
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Test 2: Verify agent config file was created
    # -------------------------------------------------------------------------
    - name: Check k3s agent config file
      ansible.builtin.stat:
        path: /tmp/mock-k3s-config/config.yaml
      register: _config_file
    
    - name: Assert config file exists
      ansible.builtin.assert:
        that:
          - _config_file.stat.exists
        fail_msg: "K3s agent config file not created"
        success_msg: "K3s agent config file exists"
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Test 3: Verify config file content
    # -------------------------------------------------------------------------
    - name: Read config file
      ansible.builtin.slurp:
        src: /tmp/mock-k3s-config/config.yaml
      register: _config_content
      ignore_errors: true
    
    - name: Assert server URL in config
      ansible.builtin.assert:
        that:
          - "'https://192.168.178.210:6443' in (_config_content.content | b64decode)"
        fail_msg: "Server URL not in config file"
        success_msg: "Server URL found in config file"
      when: _config_content is defined and _config_content.content is defined
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Test 4: Verify worker labels
    # -------------------------------------------------------------------------
    - name: Assert worker label in config
      ansible.builtin.assert:
        that:
          - "'node-role.kubernetes.io/worker=worker' in (_config_content.content | b64decode)"
        fail_msg: "Worker label not in config"
        success_msg: "Worker label found in config"
      when: _config_content is defined and _config_content.content is defined
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Summary
    # -------------------------------------------------------------------------
    - name: All tests passed
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "ALL K3S_WORKERS TESTS PASSED"
          - "=============================================="
          - "✓ Config directory created"
          - "✓ Agent config file created"
          - "✓ Server URL verified"
          - "✓ Worker label verified"
          - "=============================================="