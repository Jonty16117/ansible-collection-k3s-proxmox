---
# defaults file for k3s_workers
# Joins worker nodes to k3s cluster

# =============================================================================
# K3S CONFIGURATION
# =============================================================================
k3s_workers_version: "{{ k3s_version | default('v1.30.6+k3s1') }}"
k3s_workers_token: "{{ k3s_token | default('k3s-cluster-secret-token') }}"

# =============================================================================
# INSTALLATION PATHS
# =============================================================================
k3s_workers_install_path: /usr/local/bin
k3s_workers_config_path: /etc/rancher/k3s

# =============================================================================
# TIMEOUTS
# =============================================================================
k3s_workers_install_timeout: 300
k3s_workers_join_timeout: 300

# =============================================================================
# NODE LABELS
# =============================================================================
k3s_workers_labels:
  - "node-role.kubernetes.io/worker=worker"

# Additional custom labels (user-defined)
k3s_workers_extra_labels: []

# =============================================================================
# TAINTS
# =============================================================================
# No taints by default (workers run workloads)
k3s_workers_taints: []