---
# tasks file for k3s_workers - join
# Joins worker node to k3s cluster

- name: Get first control plane node IP
  ansible.builtin.set_fact:
    _server_url: "https://{{ hostvars[groups['control_plane'][0]].ansible_host }}:6443"

- name: Create k3s config directory
  ansible.builtin.file:
    path: "{{ k3s_workers_config_path }}"
    state: directory
    mode: '0755'

- name: Create k3s agent configuration
  ansible.builtin.template:
    src: k3s-agent-config.yaml.j2
    dest: "{{ k3s_workers_config_path }}/config.yaml"
    mode: '0600'

- name: Download and install k3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_VERSION="{{ k3s_workers_version }}" \
    INSTALL_K3S_EXEC="agent" \
    K3S_URL="{{ _server_url }}" \
    K3S_TOKEN="{{ k3s_workers_token }}" \
    sh -
  args:
    creates: "{{ k3s_workers_install_path }}/k3s"
  timeout: "{{ k3s_workers_install_timeout }}"

- name: Wait for k3s-agent service
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true

- name: Display agent installed
  ansible.builtin.debug:
    msg: "K3s agent installed successfully"