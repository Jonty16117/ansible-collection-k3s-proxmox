---
# tasks file for k3s_workers
# Joins worker nodes to the k3s cluster

- name: Check if k3s is installed
  ansible.builtin.stat:
    path: "{{ k3s_workers_install_path }}/k3s"
  register: _k3s_binary

- name: Check if k3s is running
  ansible.builtin.shell: |
    if command -v systemctl &> /dev/null; then
      systemctl is-active k3s-agent || echo "inactive"
    elif command -v rc-service &> /dev/null; then
      rc-service k3s-agent status 2>/dev/null || echo "inactive"
    else
      pgrep -x k3s-agent > /dev/null && echo "active" || echo "inactive"
    fi
  register: _k3s_status
  changed_when: false

- name: Join cluster
  ansible.builtin.include_tasks: join.yml
  when:
    - not _k3s_binary.stat.exists or _k3s_status.stdout != "active"

- name: Label node
  ansible.builtin.include_tasks: label-nodes.yml
  when: >
    (k3s_workers_labels | default([]) | length > 0) or
    (k3s_workers_extra_labels | default([]) | length > 0)

- name: Verify node is ready
  ansible.builtin.command: |
    kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: true
  register: _worker_ready
  until: _worker_ready.stdout == "True"
  retries: 50
  delay: 10
  changed_when: false