---
# tasks file for proxmox_vm - create VMs idempotently
# Creates and configures VMs in Proxmox using proxmox_kvm module

# =============================================================================
# PREPARATION
# =============================================================================

- name: Check current storage content
  ansible.builtin.shell: pvesm status
  register: _storage_status
  changed_when: false
  when: not proxmox_vm_dry_run | bool

- name: Configure local storage for cloud-init
  ansible.builtin.shell: |
    pvesm set local --content rootdir,images,backup,vztmpl,iso,snippets 2>&1
  register: _storage_result
  when:
    - not proxmox_vm_dry_run | bool
    - "'snippets' not in _storage_status.stdout"
  changed_when: "'content updated' in _storage_result.stdout or 'content set' in _storage_result.stdout"

# =============================================================================
# CHECK VM EXISTENCE
# =============================================================================

- name: Check if VMs exist
  community.proxmox.proxmox_kvm:
    api_host: "{{ vault_proxmox_api_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ k3s_proxmox_node }}"
    vmid: "{{ item.vmid }}"
    state: current
  loop: "{{ _proxmox_vm_details }}"
  when: not proxmox_vm_dry_run | bool
  register: _vm_status
  failed_when: false

# =============================================================================
# BUILD VM EXISTENCE MAP
# =============================================================================

- name: Create list of existing VM IDs
  ansible.builtin.set_fact:
    _existing_vmids: "{{ _vm_status.results | selectattr('vmid', 'defined') | map(attribute='vmid') | list }}"
  when: not proxmox_vm_dry_run | bool

- name: Create list of missing VM IDs
  ansible.builtin.set_fact:
    _missing_vmids: "{{ _proxmox_vm_details | map(attribute='vmid') | list | difference(_existing_vmids | default([])) }}"
  when: not proxmox_vm_dry_run | bool

- name: Debug VM status
  ansible.builtin.debug:
    msg:
      - "Existing VMs: {{ _existing_vmids | default([]) }}"
      - "Missing VMs: {{ _missing_vmids | default([]) }}"
  when: not proxmox_vm_dry_run | bool

# =============================================================================
# CLONE VMs FROM TEMPLATE (only for non-existent VMs)
# =============================================================================

- name: Clone VMs from template
  community.proxmox.proxmox_kvm:
    api_host: "{{ vault_proxmox_api_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ k3s_proxmox_node }}"
    vmid: "{{ k3s_proxmox_template_vmid }}"
    newid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    clone: "{{ k3s_proxmox_template_vmid }}"
    storage: "{{ item.storage }}"
    full: true
    timeout: 300
  loop: "{{ _proxmox_vm_details }}"
  when:
    - not proxmox_vm_dry_run | bool
    - item.vmid in (_missing_vmids | default([]))
  register: _clone_result

# =============================================================================
# RESIZE DISKS (for newly cloned VMs)
# =============================================================================

- name: Get current disk sizes
  ansible.builtin.shell: "qm config {{ item.vmid }} | grep '^scsi0:' | cut -d: -f2 | cut -d, -f1"
  register: _current_disks
  loop: "{{ _proxmox_vm_details }}"
  when:
    - not proxmox_vm_dry_run | bool
    - item.vmid in (_missing_vmids | default([]))
  changed_when: false

- name: Resize VM disks to match topology
  ansible.builtin.command: "qm resize {{ item.item.vmid }} scsi0 {{ item.item.disk }}"
  when:
    - not proxmox_vm_dry_run | bool
    - item.item.vmid in (_missing_vmids | default([]))
    - item.stdout != item.item.disk
  loop: "{{ _current_disks.results }}"
  register: _resize_result
  changed_when: "'resized' in _resize_result.stdout or 'size updated' in _resize_result.stdout"

# =============================================================================
# CONFIGURE VM HARDWARE (only for VMs that exist or were just cloned)
# =============================================================================

- name: Configure VM hardware
  community.proxmox.proxmox_kvm:
    api_host: "{{ vault_proxmox_api_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ k3s_proxmox_node }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    memory: "{{ item.memory }}"
    cores: "{{ item.cpu_cores }}"
    cpu: host
    net:
      net0: "virtio,bridge={{ k3s_network.bridge | default('vmbr0') }}"
    ipconfig:
      ipconfig0: "ip={{ item.ip }}/24,gw={{ k3s_network.gateway }}"
    update: true
  loop: "{{ _proxmox_vm_details }}"
  when:
    - not proxmox_vm_dry_run | bool
    - item.vmid in (_existing_vmids | default([])) or item.vmid in (_missing_vmids | default([]))

# =============================================================================
# CONFIGURE CLOUD-INIT
# =============================================================================

- name: Read SSH public key
  ansible.builtin.slurp:
    src: "{{ k3s_proxmox_cloudinit_ssh_key_path }}.pub"
  register: _ssh_key_content
  delegate_to: localhost
  when: not proxmox_vm_dry_run | bool

- name: Configure cloud-init settings
  community.proxmox.proxmox_kvm:
    api_host: "{{ vault_proxmox_api_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ k3s_proxmox_node }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    ciuser: "{{ k3s_proxmox_cloudinit_user }}"
    sshkeys: "{{ _ssh_key_content.content | b64decode | trim }}"
    nameservers: "{{ k3s_proxmox_dns_servers | join(' ') }}"
    update: true
  loop: "{{ _proxmox_vm_details }}"
  when:
    - not proxmox_vm_dry_run | bool
    - item.vmid in (_existing_vmids | default([])) or item.vmid in (_missing_vmids | default([]))

# =============================================================================
# START VMs
# =============================================================================

- name: Start VMs
  community.proxmox.proxmox_kvm:
    api_host: "{{ vault_proxmox_api_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ k3s_proxmox_node }}"
    name: "{{ item.name }}"
    vmid: "{{ item.vmid }}"
    state: started
  loop: "{{ _proxmox_vm_details }}"
  when: not proxmox_vm_dry_run | bool

# =============================================================================
# WAIT FOR SSH
# =============================================================================

- name: Wait for VMs to be reachable via SSH
  ansible.builtin.include_tasks: wait-for-ssh.yml
  vars:
    _vm_name: "{{ item.name }}"
    _vm_ip: "{{ item.ip }}"
  loop: "{{ _proxmox_vm_details }}"
  when: not proxmox_vm_dry_run | bool

# =============================================================================
# POST-CREATION SETUP
# =============================================================================

- name: Configure DNS on VMs
  ansible.builtin.include_tasks: configure-dns.yml
  vars:
    _vm_name: "{{ item.name }}"
  loop: "{{ _proxmox_vm_details }}"
  when: not proxmox_vm_dry_run | bool

- name: Build VM list for display
  ansible.builtin.set_fact:
    _vm_list_lines: "{{ _vm_list_lines | default([]) + ['- ' + item.name + ': ' + item.ip + ' (VMID: ' + item.vmid | string + ')'] }}"
  loop: "{{ _proxmox_vm_details }}"

- name: Display creation summary
  ansible.builtin.debug:
    var: _vm_list_lines

- name: Display creation header
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - "VM CREATION COMPLETE"
      - "=============================================="
      - "Created {{ _proxmox_vm_details | length }} VMs"

