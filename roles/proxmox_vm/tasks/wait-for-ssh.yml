---
# tasks file for proxmox_vm - wait for SSH
# Waits for VMs to be reachable via SSH

- name: Wait for SSH on {{ _vm_name }}
  ansible.builtin.wait_for:
    host: "{{ _vm_ip }}"
    port: 22
    timeout: "{{ proxmox_ssh_timeout }}"
    delay: "{{ proxmox_ssh_delay }}"
    state: started

- name: Copy SSH private key to pm02 (temporary)
  ansible.builtin.copy:
    src: "{{ k3s_proxmox_cloudinit_ssh_key_path }}"
    dest: "/tmp/tmp_ssh_key"
    mode: '0600'

- name: Confirm SSH connectivity
  ansible.builtin.shell: |
    ssh -o ConnectTimeout=5 \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -i /tmp/tmp_ssh_key \
        {{ k3s_proxmox_cloudinit_user }}@{{ _vm_ip }} \
        echo "SSH OK"
  register: _ssh_test
  changed_when: false

- name: Remove temporary SSH key
  ansible.builtin.file:
    path: /tmp/tmp_ssh_key
    state: absent

- name: Display SSH success
  ansible.builtin.debug:
    msg: "✓ {{ _vm_name }} ({{ _vm_ip }}) is reachable via SSH"
