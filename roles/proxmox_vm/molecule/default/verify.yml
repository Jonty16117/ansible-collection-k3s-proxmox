---
# verify.yml for proxmox_vm role
# Verifies the role logic works correctly

- name: Verify - Test proxmox_vm logic
  hosts: proxmox_nodes
  gather_facts: false
  
  tasks:
    # -------------------------------------------------------------------------
    # Test 1: Verify VM list was built correctly
    # -------------------------------------------------------------------------
    - name: Assert VM details were calculated
      ansible.builtin.assert:
        that:
          - _proxmox_vm_details is defined
          - _proxmox_vm_details | length == 2
        fail_msg: "VM list not built correctly"
        success_msg: "VM list built: {{ _proxmox_vm_details | length }} VMs"
    
    # -------------------------------------------------------------------------
    # Test 2: Verify control plane VM properties
    # -------------------------------------------------------------------------
    - name: Find CP VM in list
      ansible.builtin.set_fact:
        _cp_vm: "{{ _proxmox_vm_details | selectattr('name', 'equalto', 'k8-cp-1') | list | first }}"
    
    - name: Assert CP VM properties
      ansible.builtin.assert:
        that:
          - _cp_vm.name == "k8-cp-1"
          - _cp_vm.vmid == "500"
          - _cp_vm.ip == "192.168.178.210"
          - _cp_vm.memory == 2048
          - _cp_vm.disk == "4G"
          - _cp_vm.cpu_cores == 2
          - _cp_vm.role == "control-plane"
        fail_msg: "CP VM properties incorrect"
        success_msg: "CP VM properties verified"
    
    # -------------------------------------------------------------------------
    # Test 3: Verify worker VM properties
    # -------------------------------------------------------------------------
    - name: Find worker VM in list
      ansible.builtin.set_fact:
        _worker_vm: "{{ _proxmox_vm_details | selectattr('name', 'equalto', 'k8-wk-1') | list | first }}"
    
    - name: Assert worker VM properties
      ansible.builtin.assert:
        that:
          - _worker_vm.name == "k8-wk-1"
          - _worker_vm.vmid == "600"
          - _worker_vm.ip == "192.168.178.220"
          - _worker_vm.memory == 1536
          - _worker_vm.disk == "4G"
          - _worker_vm.cpu_cores == 2
          - _worker_vm.role == "worker"
        fail_msg: "Worker VM properties incorrect"
        success_msg: "Worker VM properties verified"
    
    # -------------------------------------------------------------------------
    # Summary
    # -------------------------------------------------------------------------
    - name: All tests passed
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "ALL PROXMOX_VM TESTS PASSED"
          - "=============================================="
          - "✓ VM list built correctly"
          - "✓ CP VM properties verified"
          - "✓ Worker VM properties verified"
          - "=============================================="