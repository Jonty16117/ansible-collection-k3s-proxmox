---
# create.yml for proxmox_vm role
# Prepares test environment

- name: Create - Prepare test environment
  hosts: localhost
  connection: local
  gather_facts: false
  
  tasks:
    - name: Ensure test SSH key exists
      ansible.builtin.file:
        path: "/tmp/test_ssh_key"
        state: touch
        mode: '0600'
      
    - name: Ensure test SSH public key exists
      ansible.builtin.file:
        path: "/tmp/test_ssh_key.pub"
        state: touch
        mode: '0644'
      
    - name: Display test setup complete
      ansible.builtin.debug:
        msg: "Test environment prepared successfully"