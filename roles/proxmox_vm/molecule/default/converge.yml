---
# converge.yml for proxmox_vm role
# Applies the role in dry-run mode for testing

- name: Converge - Test proxmox_vm role
  hosts: proxmox_nodes
  gather_facts: false
  
  tasks:
    - name: Include proxmox_vm role
      ansible.builtin.include_role:
        name: proxmox_vm
      vars:
        proxmox_vm_state: present