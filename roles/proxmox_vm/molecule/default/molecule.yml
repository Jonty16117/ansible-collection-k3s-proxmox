---
# molecule.yml for proxmox_vm role
# Molecule testing configuration (dry-run mode)

driver:
  name: delegated
  options:
    managed: false

platforms:
  - name: molecule-proxmox-test

provisioner:
  name: ansible
  inventory:
    hosts:
      all:
        children:
          proxmox_nodes:
            hosts:
              pm02-test:
                ansible_host: localhost
          control_plane:
            hosts:
              k8-cp-1:
                ansible_host: 192.168.178.210
                k3s_node_vmid: "500"
                k3s_node_memory: 2048
                k3s_node_disk: "4G"
                k3s_node_cpu_cores: 2
                k3s_node_role: "control-plane"
          workers:
            hosts:
              k8-wk-1:
                ansible_host: 192.168.178.220
                k3s_node_vmid: "600"
                k3s_node_memory: 1536
                k3s_node_disk: "4G"
                k3s_node_cpu_cores: 2
                k3s_node_role: "worker"
    group_vars:
      all:
        proxmox_vm_dry_run: true
        vault_proxmox_api_host: "pm02-test"
        vault_proxmox_api_user: "root@pam"
        vault_proxmox_api_token_id: "test"
        vault_proxmox_api_token_secret: "test-token"
        k3s_proxmox_node: "pm02"
        k3s_proxmox_template_vmid: 9600
        k3s_network:
          bridge: "vmbr0"
          gateway: "192.168.178.1"
          dns_servers:
            - "192.168.178.1"
            - "1.1.1.1"
        k3s_proxmox_cloudinit_ssh_key_path: "/tmp/test_ssh_key"

verifier:
  name: ansible

scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy