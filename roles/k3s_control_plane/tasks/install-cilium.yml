---
# tasks file for k3s_control_plane - install Cilium
# Installs Cilium CNI on the first control plane node

- name: Check if Cilium is running
  ansible.builtin.shell: |
    kubectl get pods -n {{ k3s_cilium_namespace }} -l k8s-app=cilium \
      -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound"
  environment:
    KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
  register: _cilium_check
  changed_when: false
  failed_when: false

- name: Check if Cilium CLI is installed
  ansible.builtin.stat:
    path: /usr/bin/cilium
  register: _cilium_cli

- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/bin/helm
  register: _helm_cli

- name: Check CP node count for Cilium upgrade decision
  ansible.builtin.shell: |
    kubectl get nodes --no-headers 2>/dev/null | grep -c "control-plane" || echo "0"
  environment:
    KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
  register: _cp_node_count
  changed_when: false
  failed_when: false

- name: Install Cilium
  when:
    - _cilium_check.stdout != "Running"
    - _cilium_check.stdout != "Succeeded"
    - _cp_node_count.stdout | int <= 1
  block:
    - name: Check if Alpine testing repository exists
      ansible.builtin.shell: grep -q "edge/testing" /etc/apk/repositories && echo "exists" || echo "missing"
      register: _repo_check
      changed_when: false

    - name: Enable Alpine testing repository for cilium-cli
      ansible.builtin.lineinfile:
        path: /etc/apk/repositories
        line: "http://dl-cdn.alpinelinux.org/alpine/edge/testing"
        state: present
      become: true
      when: _repo_check.stdout == "missing"

    - name: Install Cilium CLI via apk
      community.general.apk:
        name: cilium-cli
        update_cache: true
        state: present

    - name: Generate Cilium values
      ansible.builtin.template:
        src: cilium-values.yaml.j2
        dest: /tmp/cilium-values.yaml
        mode: '0600'

    - name: Deploy Cilium
      ansible.builtin.shell: |
        export KUBECONFIG="{{ k3s_control_plane_kubeconfig }}"
        /usr/bin/cilium install \
          --version {{ k3s_cilium_version }} \
          --namespace {{ k3s_cilium_namespace }} \
          --values /tmp/cilium-values.yaml
      args:
        executable: /bin/sh
      register: _cilium_install
      changed_when: "'Installing' in _cilium_install.stdout or 'Created' in _cilium_install.stdout"

    - name: Wait for Cilium pods
      ansible.builtin.command: |
        kubectl wait --for=condition=ready pod -l k8s-app=cilium \
          -n {{ k3s_cilium_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
      changed_when: false

- name: Upgrade Cilium for multi-CP cluster
  when:
    - _cilium_check.stdout == "Running" or _cilium_check.stdout == "Succeeded"
    - _cp_node_count.stdout | int > 1
  block:
    - name: Generate Cilium values for multi-CP
      ansible.builtin.template:
        src: cilium-values.yaml.j2
        dest: /tmp/cilium-values-multi-cp.yaml
        mode: '0600'

    - name: Upgrade Cilium via CLI
      ansible.builtin.shell: |
        export KUBECONFIG="{{ k3s_control_plane_kubeconfig }}"
        cilium upgrade \
          --version {{ k3s_cilium_version }} \
          --namespace {{ k3s_cilium_namespace }} \
          --values /tmp/cilium-values-multi-cp.yaml
      args:
        executable: /bin/sh
      register: _cilium_upgrade
      changed_when: "'Upgraded' in _cilium_upgrade.stdout or 'Success' in _cilium_upgrade.stdout"
      failed_when: false

    - name: Upgrade Cilium via Helm (fallback if CLI upgrade fails)
      when: _cilium_upgrade is failed or _cilium_upgrade.changed == false
      block:
        - name: Add Cilium Helm repository
          ansible.builtin.shell: |
            helm repo add cilium https://helm.cilium.io 2>/dev/null || true
            helm repo update
          args:
            executable: /bin/sh
          changed_when: false

        - name: Fix IngressClass Helm ownership (required for Helm upgrade)
          ansible.builtin.shell: |
            kubectl label ingressclass cilium app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true
            kubectl annotate ingressclass cilium meta.helm.sh/release-name=cilium meta.helm.sh/release-namespace={{ k3s_cilium_namespace }} --overwrite 2>/dev/null || true
          environment:
            KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
          args:
            executable: /bin/sh
          changed_when: false

        - name: Upgrade Cilium via Helm
          ansible.builtin.shell: |
            export KUBECONFIG="{{ k3s_control_plane_kubeconfig }}"
            helm upgrade cilium cilium/cilium \
              --version {{ k3s_cilium_version }} \
              --namespace {{ k3s_cilium_namespace }} \
              --values /tmp/cilium-values-multi-cp.yaml
          args:
            executable: /bin/sh
          register: _helm_upgrade
          changed_when: "'has been upgraded' in _helm_upgrade.stdout or 'SUCCESS' in _helm_upgrade.stdout"

    - name: Wait for Cilium pods after upgrade
      ansible.builtin.command: |
        kubectl wait --for=condition=ready pod -l k8s-app=cilium \
          -n {{ k3s_cilium_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
      changed_when: false

- name: Show Cilium status
  ansible.builtin.command: cilium status -o json
  environment:
    KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
    PATH: "/usr/bin:{{ ansible_env.PATH | default('/usr/local/bin:/usr/bin:/bin') }}"
  register: _cilium_status
  failed_when: false
  changed_when: false

- name: Display Cilium status
  vars:
    _cilium: "{{ _cilium_status.stdout | from_json }}"
  ansible.builtin.debug:
    msg:
      - "Cilium: {{ 'OK' if _cilium.pod_state.cilium.Ready == _cilium.pod_state.cilium.Desired else 'ERROR' }}"
      - "  cilium: {{ _cilium.pod_state.cilium.Ready }}/{{ _cilium.pod_state.cilium.Desired }}"
      - "  cilium-envoy: {{ _cilium.pod_state['cilium-envoy'].Ready }}/{{ _cilium.pod_state['cilium-envoy'].Desired }}"
      - "  cilium-operator: {{ _cilium.pod_state['cilium-operator'].Ready }}/{{ _cilium.pod_state['cilium-operator'].Desired }}"

- name: Wait for node to be ready (with Cilium)
  ansible.builtin.command: |
    kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
  register: _node_ready
  until: _node_ready.stdout == "True"
  retries: 50
  delay: 10
  changed_when: false

- name: Create IngressClass for Cilium
  when: k3s_is_first_node | default(false)
  block:
    - name: Render IngressClass manifest
      ansible.builtin.template:
        src: cilium-ingress-class.yaml.j2
        dest: /tmp/cilium-ingress-class.yaml
        mode: '0600'

    - name: Apply IngressClass
      ansible.builtin.shell: |
        kubectl apply -f /tmp/cilium-ingress-class.yaml
      environment:
        KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
      changed_when: false

- name: Setup Cilium L2 LoadBalancer (Install or Upgrade path)
  when:
    - k3s_cilium_l2_enabled | bool
    - k3s_is_first_node | default(false)
  block:
    - name: Render LB pool manifest
      ansible.builtin.template:
        src: cilium-lb-pool.yaml.j2
        dest: /tmp/cilium-lb-pool.yaml
        mode: '0600'

    - name: Apply CiliumLoadBalancerIPPool
      ansible.builtin.shell: |
        kubectl apply -f /tmp/cilium-lb-pool.yaml --server-side
      environment:
        KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
      changed_when: false

    - name: Render L2 announcement policy manifest
      ansible.builtin.template:
        src: cilium-l2announcement-policy.yaml.j2
        dest: /tmp/cilium-l2announcement-policy.yaml
        mode: '0600'

    - name: Apply CiliumL2AnnouncementPolicy
      ansible.builtin.shell: |
        kubectl apply -f /tmp/cilium-l2announcement-policy.yaml --server-side
      environment:
        KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
      changed_when: false

- name: Setup Cilium Ingress Controller RBAC
  when:
    - k3s_is_first_node | default(false)
  block:
    - name: Render Ingress RBAC manifest
      ansible.builtin.template:
        src: cilium-ingress-rbac.yaml.j2
        dest: /tmp/cilium-ingress-rbac.yaml
        mode: '0600'

    - name: Apply Cilium Ingress RBAC
      ansible.builtin.shell: |
        kubectl apply -f /tmp/cilium-ingress-rbac.yaml
      environment:
        KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
      changed_when: false
