---
# tasks file for k3s_control_plane
# Installs k3s control plane with Cilium CNI

- name: Check if k3s is installed
  ansible.builtin.stat:
    path: "{{ k3s_control_plane_install_path }}/k3s"
  register: _k3s_binary

- name: Check if k3s is running
  ansible.builtin.shell: |
    if command -v systemctl &> /dev/null; then
      systemctl is-active k3s || echo "inactive"
    elif command -v rc-service &> /dev/null; then
      rc-service k3s status 2>/dev/null || echo "inactive"
    else
      pgrep -x k3s > /dev/null && echo "active" || echo "inactive"
    fi
  register: _k3s_status
  changed_when: false

- name: Install k3s server
  ansible.builtin.include_tasks: install-k3s-server.yml
  when: not _k3s_binary.stat.exists or _k3s_status.stdout != "active"

- name: Ensure k3s is running
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true
  when:
    - _k3s_binary.stat.exists
    - _k3s_status.stdout != "active"

- name: Verify k3s API
  ansible.builtin.shell: |
    kubectl get --raw='/healthz?verbose' || exit 1
  environment:
    KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
  register: _api_check
  failed_when: false
  changed_when: false
  when:
    - _k3s_binary.stat.exists
    - _k3s_status.stdout == "active"

- name: Restart k3s if API unreachable
  ansible.builtin.service:
    name: k3s
    state: restarted
  when:
    - _k3s_binary.stat.exists
    - _k3s_status.stdout == "active"
    - _api_check.rc != 0

- name: Wait for API server
  ansible.builtin.shell: |
    kubectl get --raw='/healthz?verbose'
  environment:
    KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
  register: _api_health
  until: _api_health.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  when: k3s_is_first_node | bool

- name: Install Cilium
  ansible.builtin.include_tasks: install-cilium.yml
  when:
    - k3s_cilium_enabled | bool
    - k3s_is_first_node | bool

- name: Fetch kubeconfig to local machine
  when:
    - k3s_is_first_node | bool
  block:
    - name: Ensure .kube directory exists
      ansible.builtin.file:
        path: "{{ k3s_cluster_kubeconfig_save_path | dirname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: false

    - name: Fetch kubeconfig from control plane
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ k3s_cluster_kubeconfig_save_path }}"
        flat: true
        validate_checksum: true