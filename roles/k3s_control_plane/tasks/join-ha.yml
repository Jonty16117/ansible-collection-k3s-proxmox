---
# tasks file for k3s_control_plane - join HA
# Joins additional control plane nodes to the cluster

- name: Get first node IP
  ansible.builtin.set_fact:
    _first_node_ip: "{{ hostvars[groups['control_plane'][0]].ansible_host }}"

- name: Create k3s config directory
  ansible.builtin.file:
    path: "{{ k3s_control_plane_config_path }}"
    state: directory
    mode: '0755'

- name: Create k3s server configuration
  ansible.builtin.template:
    src: k3s-server-config.yaml.j2
    dest: "{{ k3s_control_plane_config_path }}/config.yaml"
    mode: '0600'

- name: Download and install k3s (HA join)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_VERSION="{{ k3s_control_plane_version }}" \
    INSTALL_K3S_EXEC="server --server https://{{ _first_node_ip }}:6443 {{ k3s_control_plane_extra_args }}" \
    K3S_TOKEN="{{ k3s_control_plane_token }}" \
    sh -
  args:
    creates: "{{ k3s_control_plane_install_path }}/k3s"
  timeout: "{{ k3s_control_plane_install_timeout }}"

- name: Wait for k3s service
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

- name: Wait for node to be ready
  ansible.builtin.command: |
    kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ k3s_control_plane_kubeconfig }}"
  register: _node_ready
  until: _node_ready.stdout == "True"
  retries: 20
  delay: 5
  changed_when: false

- name: Display HA node joined
  ansible.builtin.debug:
    msg: "HA control plane node joined successfully"