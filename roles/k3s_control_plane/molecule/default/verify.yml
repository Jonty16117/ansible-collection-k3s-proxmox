---
# verify.yml for k3s_control_plane role
# Verifies the role logic works correctly

- name: Verify - Test k3s_control_plane
  hosts: control_plane
  gather_facts: false
  become: true
  
  tasks:
    # -------------------------------------------------------------------------
    # Test 1: Verify k3s config directory was created
    # -------------------------------------------------------------------------
    - name: Check k3s config directory
      ansible.builtin.stat:
        path: /tmp/mock-k3s-config
      register: _config_dir
    
    - name: Assert config directory exists
      ansible.builtin.assert:
        that:
          - _config_dir.stat.exists
          - _config_dir.stat.isdir
        fail_msg: "K3s config directory not created"
        success_msg: "K3s config directory exists"
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Test 2: Verify config file was created
    # -------------------------------------------------------------------------
    - name: Check k3s config file
      ansible.builtin.stat:
        path: /tmp/mock-k3s-config/config.yaml
      register: _config_file
    
    - name: Assert config file exists
      ansible.builtin.assert:
        that:
          - _config_file.stat.exists
        fail_msg: "K3s config file not created"
        success_msg: "K3s config file exists"
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Test 3: Verify config file content
    # -------------------------------------------------------------------------
    - name: Read config file
      ansible.builtin.slurp:
        src: /tmp/mock-k3s-config/config.yaml
      register: _config_content
      ignore_errors: true
    
    - name: Assert token in config
      ansible.builtin.assert:
        that:
          - "'test-token' in (_config_content.content | b64decode)"
        fail_msg: "Token not in config file"
        success_msg: "Token found in config file"
      when: _config_content is defined and _config_content.content is defined
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Test 4: Verify disable components
    # -------------------------------------------------------------------------
    - name: Assert disable components in config
      ansible.builtin.assert:
        that:
          - "'flannel' in (_config_content.content | b64decode)"
          - "'kube-proxy' in (_config_content.content | b64decode)"
        fail_msg: "Disabled components not in config"
        success_msg: "Disabled components found in config"
      when: _config_content is defined and _config_content.content is defined
      ignore_errors: true
    
    # -------------------------------------------------------------------------
    # Summary
    # -------------------------------------------------------------------------
    - name: All tests passed
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "ALL K3S_CONTROL_PLANE TESTS PASSED"
          - "=============================================="
          - "✓ Config directory created"
          - "✓ Config file created"
          - "✓ Config content verified"
          - "=============================================="