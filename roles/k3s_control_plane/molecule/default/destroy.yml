---
# destroy.yml for k3s_control_plane role
# Cleans up test environment

- name: Destroy - Cleanup test environment
  hosts: localhost
  connection: local
  gather_facts: false
  
  tasks:
    - name: Remove test directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/mock-k3s"
        - "/tmp/mock-k3s-config"
      ignore_errors: true
      
    - name: Display cleanup complete
      ansible.builtin.debug:
        msg: "Test environment cleaned up"