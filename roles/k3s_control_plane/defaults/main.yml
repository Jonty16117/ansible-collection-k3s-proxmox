---
# defaults file for k3s_control_plane
# Installs k3s control plane with Cilium CNI

# =============================================================================
# K3S CONFIGURATION
# =============================================================================
k3s_control_plane_token: "{{ k3s_token | default('k3s-cluster-secret-token') }}"

# Additional k3s server arguments (CLI flags)
# Note: For etcd tuning on slow storage, use --etcd-arg prefix, e.g.: --etcd-arg snapshot-count=100
k3s_control_plane_extra_args: ""

# =============================================================================
# CILIUM CONFIGURATION
# =============================================================================
k3s_cilium_enabled: true
k3s_cilium_version: "{{ k3s_cilium.version | default('1.19.2') }}"
k3s_cilium_namespace: "kube-system"

# LoadBalancer IP pool
k3s_cilium_lb_pool_start: "{{ k3s_cilium.lb_pool_start | default('192.168.178.240') }}"
k3s_cilium_lb_pool_end: "{{ k3s_cilium.lb_pool_end | default('192.168.178.249') }}"

# Cluster CIDR (pod network)
k3s_cluster_cidr: "{{ k3s_cilium.cluster_cidr | default('10.42.0.0/16') }}"

# Resource optimization
k3s_cilium_optimized: "{{ k3s_cilium.optimized | default(true) }}"

# Hubble observability (disabled by default for production)
k3s_cilium_hubble_enabled: "{{ k3s_cilium.hubble_enabled | default(false) }}"

# Prometheus metrics (enabled by default for monitoring)
k3s_cilium_prometheus_enabled: "{{ k3s_cilium.prometheus_enabled | default(true) }}"

# Bandwidth manager (disabled by default - QoS not needed for most workloads)
k3s_cilium_bandwidth_manager: "{{ k3s_cilium.bandwidth_manager | default(false) }}"

# Egress gateway (disabled by default - only needed for multi-cluster/egress IP use cases)
k3s_cilium_egress_gateway: "{{ k3s_cilium.egress_gateway | default(false) }}"

# =============================================================================
# INSTALLATION PATHS
# =============================================================================
k3s_control_plane_install_path: /usr/local/bin
k3s_control_plane_config_path: /etc/rancher/k3s
k3s_control_plane_kubeconfig: /etc/rancher/k3s/k3s.yaml

# =============================================================================
# ETCD SETTINGS (for NFS/slow storage optimization)
# =============================================================================
k3s_etcd_snapshot_count: 100
k3s_etcd_election_timeout: 5000
k3s_etcd_heartbeat_interval: 500

# =============================================================================
# TIMEOUTS
# =============================================================================
k3s_control_plane_install_timeout: 600
k3s_control_plane_cilium_timeout: 900
k3s_control_plane_api_timeout: 180

# =============================================================================
# NODE IDENTIFICATION
# =============================================================================
# These are set by cluster_config role
k3s_is_first_node: false
k3s_node_role: "control-plane"

# =============================================================================
# KUBECONFIG, GATED TO THE 1st CONTROL PLANE NODE
# =============================================================================
k3s_cluster_kubeconfig_save_path: "~/.kube/config"
k3s_cluster_name: ""  # Set this to rename your cluster context (e.g., "my-cluster")