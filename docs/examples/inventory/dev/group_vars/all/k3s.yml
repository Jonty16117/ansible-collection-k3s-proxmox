---
# Development cluster configuration
# Minimal setup: 1 CP, 1 worker

# =============================================================================
# CLUSTER TOPOLOGY
# =============================================================================
k3s_cluster_topology:
  control_plane:
    count: 1                    # Single CP for dev (not HA)
    memory: 4096
    disk: "4G"
    cpu_cores: 2

  workers:
    count: 1
    memory: 2048
    disk: "4G"
    cpu_cores: 2

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
k3s_network:
  base_cidr: "192.168.178.0/24"
  gateway: "192.168.178.1"
  bridge: "vmbr0"
  dns_servers:
    - "192.168.178.1"
    - "1.1.1.1"

# =============================================================================
# SSH CONFIGURATION
# =============================================================================
k3s_ssh_key_path: "{{ playbook_dir }}/../../.ssh/k8s_id_ed25519_dev"

# =============================================================================
# CILIUM CONFIGURATION
# Lightweight configuration for development
# =============================================================================
k3s_cilium:
  enabled: true
  hubble_enabled: false         # Disabled for dev (save RAM)
  optimized: true
  direct_routing: true          # Native routing (no VXLAN)
  prometheus_enabled: true      # Enable metrics
  bandwidth_manager: false      # Disable QoS
  egress_gateway: false         # Disable egress gateway
