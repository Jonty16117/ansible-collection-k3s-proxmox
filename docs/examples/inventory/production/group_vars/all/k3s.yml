---
# Production cluster configuration
# Full HA: 3 CP, 5 workers

# =============================================================================
# CLUSTER IDENTITY
# =============================================================================
k3s_cluster_name: "prod-k3s"  # Rename your cluster context

# =============================================================================
# CLUSTER TOPOLOGY
# =============================================================================
k3s_cluster_topology:
  control_plane:
    count: 3                    # HA control plane
    memory: 4096
    disk: "4G"
    cpu_cores: 2

  workers:
    count: 5                    # Multiple workers for production workloads
    memory: 4096
    disk: "4G"
    cpu_cores: 2

# =============================================================================
# NETWORK CONFIGURATION
# Use separate subnet from dev/staging
# =============================================================================
k3s_network:
  base_cidr: "192.168.180.0/24"
  gateway: "192.168.180.1"
  bridge: "vmbr0"
  dns_servers:
    - "192.168.180.1"
    - "1.1.1.1"

# =============================================================================
# SSH CONFIGURATION
# =============================================================================
k3s_ssh_key_path: "{{ playbook_dir }}/../../.ssh/k8s_id_ed25519_prod"

# =============================================================================
# CILIUM CONFIGURATION
# Production-optimized configuration (lightweight & fast)
# =============================================================================
k3s_cilium:
  enabled: true
  hubble_enabled: false         # Disabled by default (save ~256MB RAM)
  optimized: true               # Reduced resource limits
  direct_routing: true          # Native routing - disable VXLAN
  prometheus_enabled: true      # Enable metrics for monitoring
  bandwidth_manager: false      # Disable QoS bandwidth limiting
  egress_gateway: false         # Disable egress gateway

# =============================================================================
# VALIDATION
# Enable all validations for production
# =============================================================================
k3s_validate_topology: true
